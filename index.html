<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokstavsjakt</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffeaa7 100%);
            background-attachment: fixed;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            opacity: 0.3;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        body::before {
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #a8edea, #fed6e3);
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #d299c2, #fef9d7);
            bottom: 50px;
            left: -50px;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #5a4a78;
            text-shadow: 3px 3px 0 #fff, 5px 5px 0 rgba(90, 74, 120, 0.2);
            letter-spacing: 2px;
        }

        .input-section {
            background: white;
            border-radius: 25px;
            padding: 2rem;
            box-shadow: 
                0 10px 40px rgba(90, 74, 120, 0.15),
                0 0 0 5px rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 1rem 1.5rem;
            font-size: 1.3rem;
            font-family: 'Nunito', sans-serif;
            border: 3px solid #e8e0f0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            background: #faf8fc;
        }

        input[type="text"]:focus {
            border-color: #b39ddb;
            background: white;
            box-shadow: 0 0 0 4px rgba(179, 157, 219, 0.2);
        }

        input[type="text"]::placeholder {
            color: #b0a0c0;
        }

        button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #7a5a6a;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }

        .clear-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 154, 158, 0.4);
        }

        .word-cloud {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            min-height: 400px;
            box-shadow: 
                0 10px 40px rgba(90, 74, 120, 0.15),
                0 0 0 5px rgba(255, 255, 255, 0.8);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            position: relative;
        }

        .word-cloud.empty::before {
            content: 'Skriv ett ord ovan för att börja samla!';
            font-size: 1.3rem;
            color: #c0b0d0;
            font-family: 'Fredoka', sans-serif;
        }

        .word {
            font-family: 'Fredoka', sans-serif;
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            font-weight: 600;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: default;
            transition: transform 0.2s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .word:hover {
            transform: scale(1.05);
        }

        .word .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #ff6b6b;
            color: white;
            border: 3px solid white;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
            font-family: Arial, sans-serif;
            line-height: 1;
        }

        .word:hover .delete-btn {
            opacity: 1;
            transform: scale(1);
        }

        .word .delete-btn:hover {
            background: #ee5a5a;
            transform: scale(1.2);
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .word-count {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: #7a6a98;
            font-weight: 600;
        }

        .word-count span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.4rem;
        }

        .color-1 { background: #ffe5ec; color: #d63384; }
        .color-2 { background: #e7f5ff; color: #1971c2; }
        .color-3 { background: #fff3bf; color: #e67700; }
        .color-4 { background: #d3f9d8; color: #2f9e44; }
        .color-5 { background: #f3d9fa; color: #9c36b5; }
        .color-6 { background: #ffe8cc; color: #d9480f; }
        .color-7 { background: #c5f6fa; color: #0c8599; }
        .color-8 { background: #ffd8a8; color: #d9480f; }
        .color-9 { background: #d0bfff; color: #6741d9; }
        .color-10 { background: #ffc9c9; color: #c92a2a; }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .input-wrapper {
                flex-direction: column;
            }
            
            button {
                width: 100%;
                justify-content: center;
            }
            
            .word-cloud {
                padding: 1.5rem;
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bokstavsjakt</h1>
        </header>

        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="wordInput" placeholder="Skriv ett ord..." autocomplete="off">
                <button class="add-btn" onclick="addWord()">
                    <span>+</span> Lägg till
                </button>
                <button class="clear-btn" onclick="clearWords()">
                    Börja om
                </button>
            </div>
        </div>

        <div class="word-cloud empty" id="wordCloud"></div>
        
        <div class="word-count">
            Antal unika ord: <span id="wordCount">0</span>
        </div>
    </div>

    <script>
        const wordInput = document.getElementById('wordInput');
        const wordCloud = document.getElementById('wordCloud');
        const wordCountEl = document.getElementById('wordCount');

        // Ladda sparade ord vid start
        let wordFrequency = JSON.parse(localStorage.getItem('bokstavsjakt') || '{}');
        renderWords();

        wordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addWord();
            }
        });

        function addWord() {
            const word = wordInput.value.trim();
            if (word) {
                const normalizedWord = word.toLowerCase();
                
                if (wordFrequency[normalizedWord]) {
                    wordFrequency[normalizedWord].count++;
                } else {
                    wordFrequency[normalizedWord] = {
                        display: word,
                        count: 1
                    };
                }
                
                saveWords();
                renderWords();
                wordInput.value = '';
                wordInput.focus();
            }
        }

        function deleteWord(normalizedWord) {
            delete wordFrequency[normalizedWord];
            saveWords();
            renderWords();
        }

        function clearWords() {
            if (Object.keys(wordFrequency).length === 0) return;
            
            wordFrequency = {};
            localStorage.removeItem('bokstavsjakt');
            saveWords();
            renderWords();
        }

        function saveWords() {
            localStorage.setItem('bokstavsjakt', JSON.stringify(wordFrequency));
        }

        function calculateFontSize(count) {
            const baseSize = 1.4;
            const increment = 0.9;
            const maxSize = 5.5;
            return Math.min(baseSize + (count - 1) * increment, maxSize);
        }

        function renderWords() {
            wordCloud.innerHTML = '';
            
            const words = Object.keys(wordFrequency);
            
            if (words.length === 0) {
                wordCloud.classList.add('empty');
            } else {
                wordCloud.classList.remove('empty');
                
                words.forEach((normalizedWord, index) => {
                    const wordData = wordFrequency[normalizedWord];
                    const wordEl = document.createElement('span');
                    wordEl.className = 'word';
                    
                    // Skapa text-nod för ordet
                    const textNode = document.createTextNode(wordData.display);
                    wordEl.appendChild(textNode);
                    
                    // Skapa delete-knapp
                    const deleteBtn = document.createElement('span');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.textContent = '×';
                    deleteBtn.onclick = function(e) {
                        e.stopPropagation();
                        deleteWord(normalizedWord);
                    };
                    wordEl.appendChild(deleteBtn);
                    
                    const colorClass = 'color-' + ((index % 10) + 1);
                    wordEl.classList.add(colorClass);
                    
                    const fontSize = calculateFontSize(wordData.count);
                    wordEl.style.fontSize = fontSize + 'rem';
                    
                    if (wordData.count > 1) {
                        wordEl.title = `${wordData.count} gånger`;
                    }
                    
                    const rotation = (Math.random() - 0.5) * 10;
                    wordEl.style.transform = `rotate(${rotation}deg)`;
                    
                    wordEl.style.animationDelay = `${index * 0.05}s`;
                    
                    wordCloud.appendChild(wordEl);
                });
            }
            
            wordCountEl.textContent = words.length;
        }
    </script>
</body>
</html>
